{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Despesas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7fb;
            color: #33475b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        .login-logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 15px;
        }
        h2 {
            color: #5b9bd5;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            color: #4a607a;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d6e4f0;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f8fbff;
            outline: none;
            font-size: 14px;
            color: #33475b;
        }
        input:focus {
            border-color: #8faadc;
        }
        .btn-submit {
            background-color: #8faadc;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #7a99cc;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .register-link {
            display: block;
            margin-top: 25px;
            font-size: 14px;
            color: #7f8c8d;
        }
        .register-link a {
            color: #5b9bd5;
            text-decoration: none;
            font-weight: bold;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="{% static 'despesas/logo.png' %}" alt="Logo Sistema" class="login-logo">
        
        <h2>Acesso ao Sistema</h2>
        
        {% if form.errors %}
            <div class="error-msg">Usuário ou senha incorretos. Tente novamente.</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="id_username">Usuário</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            
            <div class="input-group">
                <label for="id_password">Senha</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            
            <button type="submit" class="btn-submit">Entrar</button>
        </form>

        <div class="register-link">
            Não possui uma conta? <a href="{% url 'registrar' %}">Cadastrar usuário</a>
        </div>
    </div>

</body>
