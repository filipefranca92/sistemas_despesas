<!DOCTYPE html>
<html>
<head>
    <title>Página Principal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f7fb; color: #33475b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        h1 { color: #5b9bd5; margin-bottom: 30px; }
        .btn { display: block; width: 100%; background-color: #8faadc; color: white; padding: 15px; border-radius: 8px; text-decoration: none; font-size: 16px; margin-bottom: 15px; transition: background 0.3s; box-sizing: border-box; }
        .btn:hover { background-color: #6b8cce; }
        .btn-outline { background-color: transparent; border: 2px solid #8faadc; color: #8faadc; }
        .btn-outline:hover { background-color: #8faadc; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meu Financeiro</h1>
        <p>O que você deseja fazer hoje?</p>
        <a href="{% url 'adicionar' %}" class="btn">Nova Despesa</a>
        <a href="{% url 'listar' %}" class="btn btn-outline">Ver Histórico</a>
    </div>
</body>
</html>
