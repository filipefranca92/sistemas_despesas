<!DOCTYPE html>
<html>
<head>
    <title>Nova Despesa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f7fb; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d6e4f0; border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; background: #8faadc; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #5b9bd5;">Nova Despesa</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="number" step="0.01" name="valor" placeholder="Valor R$" required>
            
            <select name="categoria" required>
                <option value="" disabled selected>Selecione uma Categoria...</option>
                {% for categoria in categorias %}
                    <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
                {% endfor %}
            </select>

            <select name="forma_pagamento">
                <option value="" disabled selected>Forma de Pagamento...</option>
                {% for fp in formas_pagamento %}
                    <option value="{{ fp.id }}">{{ fp.nome }}</option>
                {% endfor %}
            </select>

            <textarea name="descricao" placeholder="Descrição da despesa" rows="4"></textarea>
            <button type="submit" class="btn-save">Salvar Despesa</button>
        </form>
        <a href="{% url 'listar' %}" style="display: block; text-align: center; margin-top: 15px; color: #8faadc; text-decoration: none;">Cancelar</a>
    </div>
</body>
</html>
