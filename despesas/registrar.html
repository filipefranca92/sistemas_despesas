<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Despesas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f7fb;
            color: #33475b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            text-align: center;
        }
        h2 {
            color: #5b9bd5;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }
        p {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            color: #4a607a;
        }
        /* Estiliza os inputs gerados automaticamente pelo Django */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d6e4f0;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #f8fbff;
            outline: none;
            font-size: 14px;
            color: #33475b;
            margin-bottom: 5px;
        }
        input:focus {
            border-color: #8faadc;
        }
        .helptext {
            display: block;
            font-size: 11px;
            color: #7f8c8d;
            margin-bottom: 15px;
            line-height: 1.4;
            text-align: left;
        }
        .btn-submit {
            background-color: #8faadc;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #7a99cc;
        }
        /* Lista de erros do formulário */
        .errorlist {
            color: #ff6b6b;
            padding-left: 20px;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: left;
            font-weight: 500;
        }
        .login-link {
            display: block;
            margin-top: 25px;
            font-size: 14px;
            color: #7f8c8d;
        }
        .login-link a {
            color: #5b9bd5;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-box">
        <h2>Criar Novo Usuário</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit" class="btn-submit">Confirmar Cadastro</button>
        </form>

        <div class="login-link">
            Já possui uma conta? <a href="{% url 'login' %}">Voltar para o Login</a>
        </div>
    </div>

</body>
</html>
